apiVersion: v1
kind: Service
metadata:
  name: {{ include "protogemcouch.fullname" . }}
  labels:
    {{- include "protogemcouch.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "protogemcouch.selectorLabels" . | nindent 4 }}
  ports:
    - name: geode
      port: {{ .Values.shimPort }}
      targetPort: geode
    - name: health
      port: {{ .Values.healthPort }}
      targetPort: health
