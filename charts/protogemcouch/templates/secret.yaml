{{- if not .Values.couchbase.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "protogemcouch.secretName" . }}
  labels:
    {{- include "protogemcouch.labels" . | nindent 4 }}
type: Opaque
stringData:
  cb-username: {{ required "couchbase.username is required unless couchbase.existingSecret is set" .Values.couchbase.username | quote }}
  cb-password: {{ required "couchbase.password is required unless couchbase.existingSecret is set" .Values.couchbase.password | quote }}
{{- end }}
