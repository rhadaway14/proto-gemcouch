apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "protogemcouch.fullname" . }}
  labels:
    {{- include "protogemcouch.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "protogemcouch.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "protogemcouch.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when the non-secret config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: protogemcouch
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: geode
              containerPort: {{ .Values.shimPort }}
            - name: health
              containerPort: {{ .Values.healthPort }}
          envFrom:
            - configMapRef:
                name: {{ include "protogemcouch.fullname" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: couchbase-credentials
              mountPath: /etc/protogemcouch/secrets
              readOnly: true
          # Give the shim time to connect to Couchbase before liveness/readiness take over.
          startupProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /live
              port: health
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: couchbase-credentials
          secret:
            secretName: {{ include "protogemcouch.secretName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
