replicaCount: 2

image:
  repository: docker.io/rhadaway14/protogemcouch
  tag: latest
  pullPolicy: IfNotPresent

# Geode listener port and health/admin port.
shimPort: 40405
healthPort: 8081

couchbase:
  connectionString: "couchbase://couchbase"
  bucket: "test"
  scope: "_default"
  collection: "_default"
  # Credentials are mounted as files (not env vars) and read via CB_USERNAME_FILE/CB_PASSWORD_FILE.
  # Either:
  #   (a) provide username/password here and the chart creates a Secret, or
  #   (b) set existingSecret to a Secret you manage (Vault / external-secrets / sealed-secrets) that
  #       has keys "cb-username" and "cb-password".
  username: "Administrator"
  password: ""
  existingSecret: ""

# Tunables passed through to the shim (see docs/RUNBOOK.md). Add more via extraEnv.
shim:
  errorResponseMode: "exception"
  handlerThreads: 64
  maxConnections: 0
  connectionIdleTimeoutSeconds: 300
  firstRequestTimeoutSeconds: 10

extraEnv: []   # e.g. [{ name: HANDLER_MAX_PENDING_TASKS, value: "10000" }]

# Inbound TLS for the Geode listener. When enabled, the keystore — and, for mutual TLS, the
# truststore — are mounted read-only from a Secret you manage (e.g. cert-manager / Vault). Rotate by
# updating that Secret and rolling the Deployment; see docs/SECURITY.md "Certificate rotation".
tls:
  enabled: false
  # Secret holding the PKCS12 keystore (and truststore for mTLS). Required when tls.enabled.
  existingSecret: ""
  keystoreFile: "keystore.p12"
  truststoreFile: ""          # set this (and clientAuth: require) to enable mutual TLS
  mountPath: "/etc/protogemcouch/tls"
  protocols: "TLSv1.3,TLSv1.2"
  ciphers: ""                 # optional cipher allowlist; empty = provider strong defaults
  clientAuth: "none"          # "require" enables mutual TLS (client-certificate auth)
  # Keystore/truststore passwords. For production, prefer injecting these from a Secret via extraEnv
  # valueFrom (TLS_KEYSTORE_PASSWORD / TLS_TRUSTSTORE_PASSWORD) rather than inline plaintext here.
  keystorePassword: ""
  truststorePassword: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

service:
  type: ClusterIP

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Time for in-flight requests to drain on pod termination (rolling updates / scale-down).
terminationGracePeriodSeconds: 30

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
