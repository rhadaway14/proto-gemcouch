version: "3.8"

services:
  geode:
    # Pinned to match the geode client jar (pom geode.version); a 1.15.0 client could not connect to
    # an unpinned :latest that floated to 1.15.1, so keep image and client version in lockstep.
    image: apachegeode/geode:1.15.1
    container_name: geode-server
    hostname: geode-server
    ports:
      - "10334:10334"
      - "40404:40404"
    command:
      - /bin/bash
      - -lc
      - |
        gfsh -e "start locator --name=locator --port=10334 --hostname-for-clients=127.0.0.1" \
             -e "start server --name=server1 --server-port=40404 --hostname-for-clients=127.0.0.1 --locators=127.0.0.1[10334]" \
             -e "create region --name=helloWorld --type=PARTITION" \
             -e "list members" \
             -e "describe region --name=helloWorld"
        tail -f /dev/null