global:
  scrape_interval: 5s
  evaluation_interval: 5s

# ProtoGemCouch alerting rules (availability, error rate, latency SLO, saturation, abuse).
rule_files:
  - protogemcouch-alerts.rules.yml

# Send fired alerts to Alertmanager (the Compose `alertmanager` service routes them by severity;
# see alertmanager/alertmanager.yml).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Scrape the ProtoGemCouch shim's Prometheus endpoint.
  # The shim exposes metrics at /metrics on its health/admin port (HEALTH_PORT, default 8081).
  # Inside the Compose network the service is reachable by its service name "protogemcouch".
  - job_name: protogemcouch
    metrics_path: /metrics
    static_configs:
      - targets: ["protogemcouch:8081"]
        labels:
          service: protogemcouch

  # Scrape Prometheus' own metrics so the stack is self-observable.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
