global:
  scrape_interval: 5s
  evaluation_interval: 5s

# ProtoGemCouch alerting rules (availability, error rate, latency SLO, saturation, abuse).
rule_files:
  - protogemcouch-alerts.rules.yml

# Send fired alerts to Alertmanager (the Compose `alertmanager` service routes them by severity;
# see alertmanager/alertmanager.yml).
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # Scrape the ProtoGemCouch shim's Prometheus endpoint.
  # The shim exposes metrics at /metrics on its health/admin port (HEALTH_PORT, default 8081).
  # Inside the Compose network the service is reachable by its service name "protogemcouch".
  - job_name: protogemcouch
    metrics_path: /metrics
    static_configs:
      - targets: ["protogemcouch:8081"]
        labels:
          service: protogemcouch

  # Host/OS metrics via node_exporter (CPU, memory, network, disk, load average). Locally this is the
  # single node-exporter container; on the multi-host capacity rig, list every host's node_exporter
  # here (shim hosts, Couchbase hosts, load generators) so the host-metrics dashboard can attribute the
  # capacity ceiling to a specific resource. The `instance` label (host:port) drives the dashboard's
  # per-host template variable.
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          role: local

  # Scrape Prometheus' own metrics so the stack is self-observable.
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
