version: "3.9"

services:
  couchbase:
    image: couchbase:enterprise-7.6.2
    container_name: protogemcouch-couchbase
    hostname: couchbase
    ports:
      - "8091:8091"
      - "8092:8092"
      - "8093:8093"
      - "8094:8094"
      - "11210:11210"
    volumes:
      - couchbase_data:/opt/couchbase/var
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8091/ui/index.html >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  couchbase-init:
    image: couchbase:enterprise-7.6.2
    container_name: protogemcouch-couchbase-init
    depends_on:
      couchbase:
        condition: service_healthy
    environment:
      CB_HOST: couchbase
      CB_ADMIN_USER: Administrator
      CB_ADMIN_PASS: password
      CB_BUCKET: test
      CB_RAMSIZE_MB: 1024
      CB_BUCKET_RAM_MB: 256
    volumes:
      - ./scripts/init-couchbase.sh:/init-couchbase.sh:ro
    entrypoint: ["/bin/sh", "/init-couchbase.sh"]
    restart: "no"

  protogemcouch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-shim
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40405:40405"
      - "8081:8081"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8081/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # TLS-enabled shim instance for validating inbound TLS against a real Geode SSL client.
  # Shares the same Couchbase; the plaintext shim above remains for all other integration tests.
  protogemcouch-tls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-tls
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40406:40405"
      - "8082:8082"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8082"
      TLS_ENABLED: "true"
      TLS_KEYSTORE_PATH: "/certs/server-keystore.p12"
      TLS_KEYSTORE_PASSWORD: "changeit"
      TLS_KEYSTORE_TYPE: "PKCS12"
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8082/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: protogemcouch-prometheus
    depends_on:
      protogemcouch:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: protogemcouch-grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Allow read-only viewing without logging in, for a frictionless local demo.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      # Land directly on the provisioned dashboard.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/protogemcouch-observability.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  couchbase_data:
  prometheus_data:
  grafana_data: