version: "3.9"

services:
  couchbase:
    image: couchbase:enterprise-7.6.2
    container_name: protogemcouch-couchbase
    hostname: couchbase
    ports:
      - "8091:8091"
      - "8092:8092"
      - "8093:8093"
      - "8094:8094"
      - "11210:11210"
    volumes:
      - couchbase_data:/opt/couchbase/var
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8091/ui/index.html >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  couchbase-init:
    image: couchbase:enterprise-7.6.2
    container_name: protogemcouch-couchbase-init
    depends_on:
      couchbase:
        condition: service_healthy
    environment:
      CB_HOST: couchbase
      CB_ADMIN_USER: Administrator
      CB_ADMIN_PASS: password
      CB_BUCKET: test
      CB_RAMSIZE_MB: 1024
      CB_BUCKET_RAM_MB: 256
    volumes:
      - ./scripts/init-couchbase.sh:/init-couchbase.sh:ro
      - couchbase_certs:/shared-certs
    entrypoint: ["/bin/sh", "/init-couchbase.sh"]
    restart: "no"

  protogemcouch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-shim
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40405:40405"
      - "8081:8081"
    # Bound the dev/soak shim like production (the Helm chart limits memory to 1Gi). Without a limit the
    # JVM sizes its heap from host RAM, so memory appears to grow unbounded under load; with this limit
    # the container-aware heap (Dockerfile -XX:MaxRAMPercentage) keeps it stable.
    mem_limit: 1g
    env_file:
      - .env
    environment:
      # Multi-replica durable subscriptions (1.2.0-M1): persist durable records + queues to Couchbase
      # so a durable client can reconnect to the other replica and replay. Validated by
      # ProtoGemCouchDurablePersistenceMultiReplicaIntegrationTest (this shim + protogemcouch-replica).
      DURABLE_PERSISTENCE: "true"
      # PDX registry persistence (1.3.0-M2): allocate PDX type/enum ids from a cluster-wide durable
      # registry so ids are consistent across replicas and survive a restart. Validated by
      # ProtoGemCouchPdxRegistryPersistenceMultiReplicaIntegrationTest (this shim + protogemcouch-replica).
      PDX_PERSISTENCE: "true"
      # OQL pushdown ON so the observability demo drives N1QL pushdown (couchbase-init creates the
      # primary index the pushdown path needs) — exercises the 1.6.0 pushdown_queries_total counter.
      OQL_PUSHDOWN: "true"
      # Distributed tracing -> Jaeger (OTLP gRPC). Tracing.initFromEnv() enables the per-operation spans
      # + the TracingRepository backend spans when an OTLP endpoint is set.
      OTEL_SERVICE_NAME: "protogemcouch-shim"
      OTEL_TRACES_EXPORTER: "otlp"
      OTEL_METRICS_EXPORTER: "none"
      OTEL_LOGS_EXPORTER: "none"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8081/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # A second, identical plaintext shim replica sharing the same Couchbase, for validating
  # multi-replica / horizontal-scaling correctness (e.g. cross-process keyset-metadata CAS).
  protogemcouch-replica:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-replica
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40409:40405"
      - "8085:8085"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8085"
      DURABLE_PERSISTENCE: "true"
      PDX_PERSISTENCE: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8085/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # TTL shim instance: applies a short Couchbase document expiry (CB_TTL_SECONDS) to value writes,
  # emulating a region-wide Geode entry-time-to-live. Validated by ProtoGemCouchTtlIntegrationTest.
  protogemcouch-ttl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-ttl
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40410:40405"
      - "8086:8086"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8086"
      CB_TTL_SECONDS: "3"
      # Per-region override: the "ttlLong" region keeps entries for 30s instead of the 3s default.
      CB_TTL_REGIONS: "ttlLong:30"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8086/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Idle-mode TTL shim: entry-idle-time semantics (reads refresh the expiry via get-and-touch).
  protogemcouch-ttl-idle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-ttl-idle
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40411:40405"
      - "8087:8087"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8087"
      CB_TTL_SECONDS: "4"
      CB_TTL_MODE: "idle"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8087/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Shim instance with a small max-value-size limit (CB_MAX_VALUE_BYTES) for validating that an
  # oversized value is rejected cleanly without persisting or touching the keyset.
  protogemcouch-maxvalue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-maxvalue
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40412:40405"
      - "8088:8088"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8088"
      # Deliberately tiny so a modest value trips the limit in the test.
      CB_MAX_VALUE_BYTES: "4096"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8088/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Pushdown shim instance: OQL_PUSHDOWN=true, so eligible OQL queries pre-filter at Couchbase (N1QL)
  # instead of scanning the whole region in the shim. Shares the same Couchbase; validated by
  # ProtoGemCouchQueryPushdownIntegrationTest (which asserts results are identical to the scan path).
  protogemcouch-pushdown:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-pushdown
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40414:40405"
      - "8090:8090"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8090"
      OQL_PUSHDOWN: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8090/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Sharded-keyset shim instance: KEYSET_SHARDS=16, so each region's keyset metadata is split across 16
  # docs (lifting the single-doc 20 MiB key-count ceiling + shrinking per-op rewrites). Shares the same
  # Couchbase; validated by ProtoGemCouchKeysetShardingIntegrationTest (exact size/keySet under
  # concurrent puts/removes/clear with sharding on).
  protogemcouch-keysetshards:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-keysetshards
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40416:40405"
      - "8096:8096"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8096"
      KEYSET_SHARDS: "16"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8096/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Cross-version shim instance: widens the accepted client protocol versions to include Geode 1.13.x
  # (ordinal 120) and 1.14.x (125) alongside 1.15.x (150), so the cross-version client matrix can run
  # real lower-version Geode clients against the (1.15.x-built) shim and confirm wire interoperability.
  # See .github/workflows/cross-version-matrix.yml and cross-version-client/.
  protogemcouch-crossver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-crossver
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40415:40405"
      - "8095:8095"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8095"
      SUPPORTED_VERSION_ORDINALS: "120,125,150"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8095/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # TLS-enabled shim instance for validating inbound TLS against a real Geode SSL client.
  # Shares the same Couchbase; the plaintext shim above remains for all other integration tests.
  protogemcouch-tls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-tls
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40406:40405"
      - "8082:8082"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8082"
      TLS_ENABLED: "true"
      TLS_KEYSTORE_PATH: "/certs/server-keystore.p12"
      TLS_KEYSTORE_PASSWORD: "changeit"
      TLS_KEYSTORE_TYPE: "PKCS12"
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8082/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # TLS-policy shim instance pinned to TLS 1.3 only (TLS_PROTOCOLS), for validating that the shim
  # enforces its configured protocol policy and rejects an older-protocol client.
  protogemcouch-tls13:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-tls13
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40413:40405"
      - "8089:8089"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8089"
      TLS_ENABLED: "true"
      TLS_KEYSTORE_PATH: "/certs/server-keystore.p12"
      TLS_KEYSTORE_PASSWORD: "changeit"
      TLS_KEYSTORE_TYPE: "PKCS12"
      TLS_PROTOCOLS: "TLSv1.3"
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8089/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Mutual-TLS shim instance: requires clients to present a certificate trusted by the server
  # truststore (transport-level client authentication). Validated by ProtoGemCouchMutualTlsIntegrationTest.
  protogemcouch-mtls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-mtls
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40407:40405"
      - "8083:8083"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8083"
      TLS_ENABLED: "true"
      TLS_KEYSTORE_PATH: "/certs/server-keystore.p12"
      TLS_KEYSTORE_PASSWORD: "changeit"
      TLS_KEYSTORE_TYPE: "PKCS12"
      TLS_CLIENT_AUTH: "require"
      TLS_TRUSTSTORE_PATH: "/certs/server-truststore.p12"
      TLS_TRUSTSTORE_PASSWORD: "changeit"
      TLS_TRUSTSTORE_TYPE: "PKCS12"
    volumes:
      - ./certs:/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8083/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Backend-TLS shim instance: connects to Couchbase over TLS (couchbases://), trusting the cluster
  # certificate exported by couchbase-init. Inbound Geode is plaintext here. Validated by
  # ProtoGemCouchBackendTlsIntegrationTest.
  protogemcouch-cbtls:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protogemcouch-cbtls
    depends_on:
      couchbase:
        condition: service_healthy
      couchbase-init:
        condition: service_completed_successfully
    ports:
      - "40408:40405"
      - "8084:8084"
    env_file:
      - .env
    environment:
      HEALTH_PORT: "8084"
      CB_CONNSTR: "couchbases://couchbase"
      CB_TLS_ENABLED: "true"
      CB_TLS_CERT_PATH: "/shared-certs/couchbase-cert.pem"
      # The cluster's self-signed cert may not carry a SAN matching the "couchbase" service name,
      # so hostname verification is disabled for this test instance. Production should use a cert
      # whose SAN matches the Couchbase hostname and leave verification on.
      CB_TLS_VERIFY_HOSTNAME: "false"
    volumes:
      - couchbase_certs:/shared-certs:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://127.0.0.1:8084/ready >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # Host/OS metrics (CPU, memory, network, disk, load). Primarily for the multi-host capacity rig,
  # where each shim / Couchbase / load-generator host runs its own node_exporter; included in the local
  # stack so the host-metrics dashboard renders against live data. On the rig, run this same exporter
  # on every host and add each as a Prometheus target (see the deploy/ automation).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: protogemcouch-node-exporter
    pid: host
    command:
      - "--path.rootfs=/host"
      # Exclude pseudo / container-overlay filesystems so disk panels show real volumes only.
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|cgroup|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|overlay|proc|procfs|pstore|securityfs|sysfs|tmpfs|tracefs)$$"
    volumes:
      - "/:/host:ro"
    ports:
      - "9100:9100"
    restart: unless-stopped

  # Distributed-tracing backend (OTLP in, Jaeger UI out). The shim exports per-operation + backend
  # spans here when OTEL_* is set (see the protogemcouch service). UI at http://localhost:16686.
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: protogemcouch-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: protogemcouch-prometheus
    depends_on:
      protogemcouch:
        condition: service_started
      alertmanager:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/protogemcouch-alerts.rules.yml:/etc/prometheus/protogemcouch-alerts.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: protogemcouch-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.1.1
    container_name: protogemcouch-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    container_name: protogemcouch-promtail
    depends_on:
      loki:
        condition: service_started
    volumes:
      - ./loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Read-only access to the Docker socket for container discovery + log tailing.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.0
    container_name: protogemcouch-grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Allow read-only viewing without logging in, for a frictionless local demo.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      # Business Charts (Apache ECharts) panel — powers the "stunning" visuals: Sankey, Sunburst,
      # Treemap, Liquid-fill gauge, Radar, etc. Downloaded on container start (needs internet).
      GF_INSTALL_PLUGINS: volkovlabs-echarts-panel
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: volkovlabs-echarts-panel
      # Land directly on the provisioned dashboard.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/protogemcouch-observability.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  couchbase_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  loki_data:
  couchbase_certs: