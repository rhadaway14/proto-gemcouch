name: Integration and Failure Tests

# Runs the Docker-backed integration suite (real Geode client -> shim -> Couchbase) via `mvn verify`,
# which the unit-only build-test workflow does not exercise. This enforces the compatibility and
# failure-mode suites before changes reach mainline.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Deploy-only / docs-only changes (gitops/**, docs/**) can't affect the integration suite, so
      # skip it for them. The job still runs and succeeds, so this required check always reports.
      - name: Detect code changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '**'
              - '!gitops/**'
              - '!docs/**'

      - name: Set up Java 17
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Docker / Compose versions
        if: steps.filter.outputs.code == 'true'
        run: |
          docker version
          docker compose version

      - name: Run integration suite (mvn verify)
        # verify packages the shaded jar, brings up Couchbase + the shim via Docker Compose
        # (pre-integration-test), runs the failsafe @Tag("integration") suite, then tears the
        # stack down (post-integration-test).
        if: steps.filter.outputs.code == 'true'
        run: mvn -B verify

      - name: Dump shim logs on failure
        if: failure() && steps.filter.outputs.code == 'true'
        run: docker compose logs --no-color --tail 400 || true

      - name: Skip note (no code changes)
        if: steps.filter.outputs.code != 'true'
        run: echo "Only gitops/docs changed — skipping integration suite; required check passes."
