name: Cross-Version Client Matrix

# Runs a REAL Geode client of several protocol versions (1.13.x / 1.14.x / 1.15.x) against the shim and
# asserts the core wire surface (CRUD, bulk, metadata, OQL over map + PDX) works — validating cross-version
# interoperability beyond the shim's built 1.15.x line. The shim stays at its pinned Geode version (in
# docker, with SUPPORTED_VERSION_ORDINALS widened to accept the lower versions); only the standalone
# `cross-version-client` harness is rebuilt per matrix version (public client API only — no shim code).
#
# Not per-PR (needs network to resolve each Geode version's full dependency tree, and brings up a stack):
# on demand, weekly, and on release tags, so a v* release additionally clears cross-version interop.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'
  push:
    tags:
      - 'v*'

jobs:
  cross-version:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        geode_client_version: ['1.13.0', '1.14.0', '1.15.1']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build shaded jar (shim, pinned Geode version)
        run: mvn -B -DskipTests package

      - name: Start widened cross-version shim + Couchbase
        run: docker compose up -d --build couchbase couchbase-init protogemcouch-crossver

      - name: Wait for the shim to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://127.0.0.1:8095/ready >/dev/null 2>&1; then echo "ready"; exit 0; fi
            sleep 2
          done
          echo "shim did not become ready" >&2; exit 1

      - name: Run cross-version client (Geode ${{ matrix.geode_client_version }})
        run: |
          mvn -B -f cross-version-client/pom.xml \
            -Dgeode.client.version=${{ matrix.geode_client_version }} \
            compile exec:java \
            -Dexec.mainClass=com.protogemcouch.crossversion.CrossVersionClient \
            -Dexec.args="127.0.0.1 40415"

      - name: Dump shim logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200 protogemcouch-crossver couchbase || true

      - name: Tear down
        if: always()
        run: docker compose down -v
