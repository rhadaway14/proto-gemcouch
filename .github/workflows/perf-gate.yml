name: Performance Regression Gate

# Runs the concurrency benchmark against a real shim + Couchbase and fails on a gross performance
# regression (scripts/perf-gate.sh vs scripts/perf-baseline.env). Deliberately NOT run per-PR: shared
# runners are too noisy for a per-change gate. It runs on demand, weekly, and on release tags — so a
# `v*` release additionally clears the perf gate alongside verify (release-candidate.yml) and the
# image scan (docker-image.yml).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'
  push:
    tags:
      - 'v*'

jobs:
  perf-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build shaded jar
        run: mvn -B -DskipTests package

      - name: Start shim + Couchbase
        run: docker compose up -d --build protogemcouch

      - name: Run performance-regression gate
        run: bash scripts/perf-gate.sh

      # Query-weighted gate: exercise and guard the OQL pushdown query path (not just CRUD).
      - name: Start pushdown shim
        run: docker compose up -d --build protogemcouch-pushdown

      - name: Create the query-field GSI (pushdown index)
        run: |
          curl -fsS -u Administrator:password http://127.0.0.1:8093/query/service \
            --data-urlencode 'statement=CREATE INDEX idx_perf_k IF NOT EXISTS ON `test`(TO_NUMBER(`value`.`k`.`value`))'

      - name: Run query-weighted (pushdown) perf-gate
        run: PERF_BASELINE=scripts/perf-baseline.query.env PERF_SHIM_PORT=40414 PERF_HEALTH_PORT=8090 bash scripts/perf-gate.sh

      - name: Dump shim logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 200 protogemcouch protogemcouch-pushdown couchbase || true

      - name: Tear down
        if: always()
        run: docker compose down -v
