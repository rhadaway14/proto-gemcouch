name: Release Candidate Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Show Docker / Compose versions
        run: |
          docker version
          docker compose version

      # Release gate: a tag must pass the FULL Docker-backed integration suite (real Geode client ->
      # shim -> Couchbase), not just unit tests — tag pushes do not trigger the branch-scoped
      # integration workflow. `verify` also packages the shaded jar. The image published by
      # docker-image.yml on the same tag is additionally Trivy-scanned and cosign-signed.
      - name: Run full verify (unit + integration gate)
        run: mvn -B verify

      - name: Dump shim logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 400 || true

      - name: Upload release jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: protogemcouch-${{ github.ref_name }}
          path: target/protogemcouch.jar