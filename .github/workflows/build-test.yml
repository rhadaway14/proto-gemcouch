name: Build and Test

on:
  push:
    branches:
      - master
      - main
      - 'feature/**'
  pull_request:
    branches:
      - master
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Unit tests run under the JaCoCo agent; the jacoco:check bound to the test phase
      # fails the build if line coverage of the unit-testable surface drops below the floor
      # in pom.xml (jacoco.line.coverage.min). See docs/TEST_STRATEGY.md.
      - name: Run unit tests (with coverage gate)
        run: mvn -B clean test

      # Always publish the coverage report, even when the gate fails, so a regression is diagnosable.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          if-no-files-found: warn

      - name: Package application
        run: mvn -B package -DskipTests

      - name: Upload packaged jar
        uses: actions/upload-artifact@v4
        with:
          name: protogemcouch-jar
          path: target/protogemcouch.jar