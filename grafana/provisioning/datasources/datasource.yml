apiVersion: 1

# Auto-provision the Prometheus datasource so the dashboard works with zero manual setup.
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 5s
      httpMethod: POST

  # Loki for log aggregation (shim logs shipped by Promtail). Query with LogQL, e.g.
  #   {container="protogemcouch-shim"} | logfmt | event="malformed_frame"
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
