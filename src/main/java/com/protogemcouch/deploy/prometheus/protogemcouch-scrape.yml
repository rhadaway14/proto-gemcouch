# Sample Prometheus scrape config for ProtoGemCouch.
#
# For Docker Compose on the same host, scrape localhost:8081.
# For Kubernetes or remote deployment, replace the target with the service DNS name
# or the reachable host:port for the ProtoGemCouch health/admin endpoint.

scrape_configs:
  - job_name: "protogemcouch"
    metrics_path: "/metrics"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "127.0.0.1:8081"
        labels:
          app: "protogemcouch"
          environment: "local"
